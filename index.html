  function fmtDT(d) {
    if (!d) return '-';
    const dt = new Date(d);
    return `${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
  }
  function statusBadge(s) {

  // ============================
  // AUTH
  // ============================
  let CU = null; // current user
  try { CU = JSON.parse(sessionStorage.getItem('dg_cu') || 'null'); } catch {}

  function doLogin(username, password) {
    const u = (DB.get('users')||[]).find(u => u.username===username && u.password===password);
    if (u) { CU = {...u}; sessionStorage.setItem('dg_cu', JSON.stringify(CU)); }
    return u || null;
  }
  function logout() { CU=null; sessionStorage.removeItem('dg_cu'); go('/login'); }
  function syncUser() {
    if (!CU) return;
    const u = (DB.get('users')||[]).find(u=>u.id===CU.id);
    if (u) { CU={...u}; sessionStorage.setItem('dg_cu', JSON.stringify(CU)); }
  }

  // ============================
  // ROUTER
  // ============================
  function go(path) { window.location.hash = path; }
  function getPath() { return window.location.hash.slice(1) || '/login'; }

  window.addEventListener('hashchange', render);

  function render() {
    const path = getPath();
    const app = document.getElementById('app');
    if (path === '/login') { app.innerHTML = loginPage(); return; }
    if (!CU) { go('/login'); return; }
    syncUser();

    const isAdmin = CU.role === 'admin';

    // Player routes
    if (path === '/dashboard') { app.innerHTML = wrap(dashboardPage(), false); return; }
    if (path === '/games') { app.innerHTML = wrap(gamesPage(), false); return; }
    if (path.startsWith('/games/') && !path.startsWith('/games/a')) {
      const id = path.split('/')[2];
      app.innerHTML = wrap(gameDetailPage(id), false); return;
    }
    if (path === '/seed') { app.innerHTML = wrap(seedPage(), false); return; }
    if (path === '/ranking') { app.innerHTML = wrap(rankingPage(), false); return; }
    if (path === '/profile') { app.innerHTML = wrap(profilePage(), false); bindProfile(); return; }

    // Admin routes
    if (isAdmin) {
      if (path === '/admin/dashboard') { app.innerHTML = wrap(adminDashPage(), true); return; }
      if (path === '/admin/games') { app.innerHTML = wrap(adminGamesPage(), true); return; }
      if (path.startsWith('/admin/games/')) { const id=path.split('/')[3]; app.innerHTML=wrap(adminGameDetailPage(id),true); bindAdminGameDetail(id); return; }
      if (path === '/admin/players') { app.innerHTML = wrap(adminPlayersPage(), true); return; }
      if (path.startsWith('/admin/players/')) { const id=path.split('/')[3]; app.innerHTML=wrap(adminPlayerDetail(id),true); bindPlayerSeed(id); return; }
      if (path === '/admin/seed') { app.innerHTML = wrap(adminSeedPage(), true); return; }
    }

    go(isAdmin ? '/admin/dashboard' : '/dashboard');
  }

  // ============================
  // LAYOUT
  // ============================
  function wrap(content, admin) {
    const p = getPath();
    const playerNav = [
      {h:'/dashboard', i:'🏠', l:'대시보드'},
      {h:'/games', i:'🃏', l:'게임 목록'},
      {h:'/seed', i:'💰', l:'시드 내역'},
      {h:'/ranking', i:'🏆', l:'DPI 랭킹'},
      {h:'/profile', i:'👤', l:'내 정보'},
    ];
    const adminNav = [
      {h:'/admin/dashboard', i:'📊', l:'현황 요약'},
      {h:'/admin/games', i:'🃏', l:'게임 관리'},
      {h:'/admin/players', i:'👥', l:'플레이어'},
      {h:'/admin/seed', i:'💰', l:'시드 현황'},
    ];
    const nav = (admin && CU.role==='admin') ? adminNav : playerNav;
    const links = nav.map(n=>`<a href="#${n.h}" class="nav-link ${p===n.h?'active':''}">${n.i} ${n.l}</a>`).join('');
    const bottomLinks = nav.map(n=>`<a href="#${n.h}" class="bottom-nav-item ${p===n.h?'active':''}"><span class="bni">${n.i}</span><span>${n.l}</span></a>`).join('');
    const toggleAdmin = CU.role==='admin' ? `
      <div class="border-t border-slate-700 pt-3 mt-2">
        <a href="#${admin?'/dashboard':'/admin/dashboard'}" class="nav-link text-xs text-slate-500">
          ${admin?'↩ 플레이어 뷰':'⚙ 관리자 뷰'}
        </a>
      </div>` : '';
    const mobileAdminToggle = CU.role==='admin' ? `<a href="#${admin?'/dashboard':'/admin/dashboard'}" class="bottom-nav-item text-slate-500"><span class="bni">${admin?'↩':'⚙'}</span><span>${admin?'플레이어':'관리자'}</span></a>` : '';
    return `
      <div class="flex" style="min-height:100vh">
        <div class="sidebar flex flex-col">
          <div class="mb-6 px-2">
            <div class="text-green-400 font-bold text-lg">♠ DG 홀덤</div>
            <div class="text-slate-500 text-xs mt-1">${CU.name} · ${CU.role==='admin'?'관리자':'플레이어'}</div>
          </div>
          <nav class="flex flex-col gap-0.5 flex-1">${links}</nav>
          ${toggleAdmin}
          <button onclick="logout()" class="mt-4 text-left nav-link text-slate-500 text-xs">🚪 로그아웃</button>
        </div>
        <div class="main-content flex-1 p-6 overflow-auto" style="max-width:calc(100vw - 220px);min-width:0">${content}</div>
      </div>
      <nav class="bottom-nav">
        ${bottomLinks}
        ${mobileAdminToggle}
        <button onclick="logout()" class="bottom-nav-item"><span class="bni">🚪</span><span>로그아웃</span></button>
      </nav>`;
  }

    const myEntries = entries.filter(e => e.userId === CU.id);
    const myGameIds = [...new Set(myEntries.map(e => e.gameId))];
    const recentGames = myGameIds.map(gid => {
      const game = games.find(g => g.id === gid);
      const ge = myEntries.filter(e => e.gameId === gid);
      return { game, buyins: ge.filter(e=>e.type==='buyin').length, rebuys: ge.filter(e=>e.type==='rebuy').length, ge };
    }).filter(x => x.game).slice(0, 5);

    const openCards = activeGames.length ? activeGames.map(g => {
      const cnt = [...new Set((entries.filter(e=>e.gameId===g.id)).map(e=>e.userId))].length;
      const joined = entries.some(e=>e.gameId===g.id && e.userId===CU.id);
      const isActive = g.status === 'active';
      return `
        <div class="card p-4 flex items-center justify-between">

  };
  window.closeM = () => { document.getElementById('modal-root').innerHTML = ''; };

  window.doBuyin = function(gameId, payment) {
    const game = (DB.get('games')||[]).find(g=>g.id===gameId);
    const entries = DB.get('entries')||[];
    const joined = entries.some(e=>e.gameId===gameId&&e.userId===CU.id);
    const eid = uuid();
    entries.push({ id:eid, gameId, userId:CU.id, type:joined?'rebuy':'buyin', payment, amount:game.buyInAmount, createdAt:new Date().toISOString() });
    DB.set('entries', entries);
    if (payment==='seed') {
      const users = DB.get('users')||[];
      const ui = users.findIndex(u=>u.id===CU.id);
      users[ui].seedBalance -= game.buyInAmount;
      DB.set('users', users);
      const txns = DB.get('seedTxns')||[];
      txns.push({ id:uuid(), userId:CU.id, type:'use', amount:-game.buyInAmount, balanceAfter:users[ui].seedBalance, note:`${game.type} ${game.sessionNo}차 ${joined?'리바인':'바인'}`, entryId:eid, createdAt:new Date().toISOString() });
      DB.set('seedTxns', txns);
      syncUser();
    }
    closeM();
    render();
  };

  // ============================
  // RANKING
  // ============================
  function rankingPage() {
    const users = (DB.get('users')||[]).filter(u=>u.role==='player');
    const entries = DB.get('entries')||[];
    const awards = DB.get('awards')||[];

    const stats = users.map(u => {
      const ue = entries.filter(e=>e.userId===u.id);
      const ua = awards.filter(a=>a.userId===u.id);
      const gamesPlayed = [...new Set(ue.map(e=>e.gameId))].length;
      const totalBuyins = ue.filter(e=>e.type==='buyin').length; // = gamesPlayed
      const totalRebuys = ue.filter(e=>e.type==='rebuy').length;
      const wins1 = ua.filter(a=>a.rank===1).length;
      const winsChop = ua.filter(a=>a.rank===null).length;
      const totalWins = ua.length;
      const dealer = u.dealer || 0;
      const rawScore = ua.reduce((s,a)=>s+(a.dpiScore||0),0);
      // DPI 공식: 수상점수합 × MIN(1, 총바인/10) + 총바인×0.2 + 딜러×0.5
      const totalDPI = rawScore * Math.min(1, totalBuyins/10) + totalBuyins*0.2 + dealer*0.5;
      const expectedDPI = rawScore + totalBuyins*0.2 + dealer*0.5; // 패널티 없을 때
      const penalty = totalBuyins < 10;
      return { u, gamesPlayed, totalBuyins, totalRebuys, wins1, winsChop, totalWins, rawScore, totalDPI, expectedDPI, penalty, dealer };
    }).sort((a,b) => b.totalDPI - a.totalDPI);

    const icons = ['🥇','🥈','🥉'];
    const rows = stats.map((s,i) => `<tr ${s.u.id===CU.id?'style="background:#16a34a10"':''}>
      <td class="${i<3?['rank-1','rank-2 text-slate-300','rank-3'][i]:'text-slate-400'}">${icons[i]||i+1}</td>
      <td class="font-medium">${s.u.name} ${s.u.id===CU.id?'<span class="text-green-400 text-xs">(나)</span>':''}</td>
      <td>${s.gamesPlayed}</td>
      <td>${s.totalBuyins}</td>
      <td>${s.totalRebuys}</td>
      <td class="font-semibold">${s.totalWins}</td>
      <td class="font-bold ${s.penalty?'text-slate-400':'text-yellow-400'}">${s.totalDPI.toFixed(1)}${s.penalty?`<span class="text-slate-500 text-xs font-normal"> (기대 ${s.expectedDPI.toFixed(1)})</span>`:''}</td>
      <td>${s.penalty?'<span class="text-orange-400 text-xs">⚠ 미달</span>':'<span class="text-green-400 text-xs">✓</span>'}</td>
    </tr>`).join('');

    return `
      <div class="space-y-6">
        <h1 class="text-2xl font-bold">🏆 DPI 순위 리더보드</h1>
        <div class="card overflow-hidden">
          <table><thead><tr><th>순위</th><th>이름</th><th>참여</th><th>바인</th><th>리바인</th><th>우승횟수</th><th>DPI 점수</th><th>비고</th></tr></thead>
          <tbody>${rows}</tbody></table>
        </div>
        <div class="card p-5 text-sm text-slate-400">
          <p class="font-semibold text-slate-300 mb-3">📐 DPI 계산 방식</p>
          <div class="grid grid-cols-2 gap-x-8 gap-y-1">
            <p>• 게임점수 = 0.3 × 총엔트리 × 게임시간 × 비율 / 개인엔트리</p>
            <p>• 순위 비율: 1등 50% / 2등 30% / 3등 20%</p>
            <p>• 찹: 동률자 수로 균등 분배</p>
            <p>• DPI = 점수합 × MIN(1, 총바인/10) + 총바인×0.2 + 딜러×0.5</p>
            <p>• 10게임 미만: 수상점수에 (총바인/10) 페널티 적용</p>
            <p>• 딜러 참여 1회 = +0.5점</p>
          </div>
        </div>
      </div>`;
  }

  function bindProfile() {
    // 아이디 변경
    const idForm = document.getElementById('id-form');
    if (idForm) {
      idForm.addEventListener('submit', e => {
        e.preventDefault();
        const newId = document.getElementById('id-new').value.trim();
        const pw = document.getElementById('id-pw').value;
        if (pw !== CU.password) return msg('id-msg','err','비밀번호가 맞지 않습니다.');
        if (newId.length < 4) return msg('id-msg','err','아이디는 4자 이상이어야 합니다.');
        if (!/^[a-zA-Z0-9_]+$/.test(newId)) return msg('id-msg','err','영문·숫자·밑줄만 사용 가능합니다.');
        const users = DB.get('users')||[];
        if (users.some(u=>u.username===newId && u.id!==CU.id)) return msg('id-msg','err','이미 사용 중인 아이디입니다.');
        const ui = users.findIndex(u=>u.id===CU.id);
        users[ui].username = newId;
        DB.set('users', users);
        syncUser();
        document.getElementById('id-new').value='';
        document.getElementById('id-pw').value='';
        msg('id-msg','ok','아이디가 변경되었습니다. 다음 로그인부터 새 아이디를 사용하세요.');
      });
    }

      const users = DB.get('users')||[];
      const ui = users.findIndex(u=>u.id===CU.id);
      users[ui].password = nw;
      DB.set('users', users);
      syncUser();
      msg('pw-msg','ok','비밀번호가 변경되었습니다.');

  // 관리자 엔트리 수동 추가
  window.adminAddEntry = function(gameId, userId, type) {
    const game = (DB.get('games')||[]).find(g=>g.id===gameId);
    const user = (DB.get('users')||[]).find(u=>u.id===userId);
    const canSeed = user.seedBalance >= game.buyInAmount;
    document.getElementById('modal-root').innerHTML = `
      <div class="modal-overlay" id="mo">
        <div class="modal" style="max-width:340px">
          <h3 class="text-base font-bold mb-1">${user.name} — ${type==='rebuy'?'리바인':'바인'} 추가</h3>
          <p class="text-slate-400 text-sm mb-5">결제 방식을 선택하세요 (${fmtMoney(game.buyInAmount)})</p>
          ${canSeed
            ? `<button onclick="adminDoAddEntry('${gameId}','${userId}','${type}','seed')" class="btn-primary w-full text-center mb-3">🌱 시드 차감 (잔액 ${fmtMoney(user.seedBalance-game.buyInAmount)})</button>`
            : `<button disabled class="w-full mb-3 p-2 rounded-lg text-slate-500 text-sm cursor-not-allowed" style="background:#1e293b;border:1px solid #334155">🌱 시드 잔액 부족</button>`}
          <button onclick="adminDoAddEntry('${gameId}','${userId}','${type}','cash')" class="btn-secondary w-full text-center mb-3">💵 현금</button>
          <button onclick="closeM()" class="w-full text-slate-500 text-sm mt-1 text-center">취소</button>
        </div>
      </div>`;
    document.getElementById('mo').addEventListener('click', e => { if(e.target.id==='mo') closeM(); });
  };

  window.adminDoAddEntry = function(gameId, userId, type, payment) {
    const game = (DB.get('games')||[]).find(g=>g.id===gameId);
    const entries = DB.get('entries')||[];
    const eid = uuid();
    entries.push({ id:eid, gameId, userId, type, payment, amount:game.buyInAmount, createdAt:new Date().toISOString() });
    DB.set('entries', entries);
    if (payment==='seed') {
      const users = DB.get('users')||[];
      const ui = users.findIndex(u=>u.id===userId);
      users[ui].seedBalance -= game.buyInAmount;
      DB.set('users', users);
      const txns = DB.get('seedTxns')||[];
      txns.push({ id:uuid(), userId, type:'use', amount:-game.buyInAmount, balanceAfter:users[ui].seedBalance,
        note:`[관리자] ${game.type} ${game.sessionNo}차 ${type==='rebuy'?'리바인':'바인'} 추가`, entryId:eid, createdAt:new Date().toISOString() });
      DB.set('seedTxns', txns);
    }
    closeM();
    render();
  };

  // 관리자 엔트리 수동 삭제 — 결제 방식 선택
  window.adminRemoveEntry = function(gameId, userId, type) {
    const entries = DB.get('entries')||[];
    const userEntries = [...entries].filter(e=>e.gameId===gameId&&e.userId===userId&&e.type===type);
    if (!userEntries.length) { alert('삭제할 리바인 엔트리가 없습니다.'); return; }
    const seedCnt = userEntries.filter(e=>e.payment==='seed').length;
    const cashCnt = userEntries.filter(e=>e.payment==='cash').length;
    const game = (DB.get('games')||[]).find(g=>g.id===gameId);
    const user = (DB.get('users')||[]).find(u=>u.id===userId);
    document.getElementById('modal-root').innerHTML = `
      <div class="modal-overlay" id="mo">
        <div class="modal" style="max-width:340px">
          <h3 class="text-base font-bold mb-1">${user?.name} — 리바인 삭제</h3>

  window.adminDoRemoveEntry = function(gameId, userId, type, payment) {
    const entries = DB.get('entries')||[];
    const toRemove = [...entries]
      .filter(e=>e.gameId===gameId&&e.userId===userId&&e.type===type&&e.payment===payment)
      .sort((a,b)=>b.createdAt.localeCompare(a.createdAt))[0];
    if (!toRemove) { alert('해당 결제 방식의 엔트리를 찾을 수 없습니다.'); closeM(); return; }
    const game = (DB.get('games')||[]).find(g=>g.id===gameId);
    if (payment==='seed') {
      const users = DB.get('users')||[];
      const ui = users.findIndex(u=>u.id===userId);
      users[ui].seedBalance += toRemove.amount;
      DB.set('users', users);
      const txns = DB.get('seedTxns')||[];
      txns.push({ id:uuid(), userId, type:'refund', amount:toRemove.amount, balanceAfter:users[ui].seedBalance,
        note:`[관리자] ${game.type} ${game.sessionNo}차 리바인 삭제/환불`, createdAt:new Date().toISOString() });
      DB.set('seedTxns', txns);
    }
    DB.set('entries', entries.filter(e=>e.id!==toRemove.id));
    closeM();
    render();
  };

  window.setStatus = function(gameId, status) {
    const games = DB.get('games')||[];
    const i = games.findIndex(g=>g.id===gameId);
    if (i>=0) { games[i].status=status; DB.set('games',games); render(); }

  window.saveAwards = function(gameId, type) {
    const game = (DB.get('games')||[]).find(g=>g.id===gameId);
    const entries = DB.get('entries')||[];
    const awards = DB.get('awards')||[];
    const ge = entries.filter(e=>e.gameId===gameId);
    // 공식: 0.3 × 총엔트리 × 게임시간 × 비율 / 개인엔트리수
    const totalEntryScore = ge.length * game.duration * 0.3;
    const totalPrize = ge.length * game.buyInAmount;

    if (type==='chop') {
      const winners = [...document.querySelectorAll('input[name="cw"]:checked')].map(el=>el.value);
      if (!winners.length) { alert('수상자를 선택하세요.'); return; }
      const prize = Math.floor(totalPrize / winners.length);
      winners.forEach(uid => {
        const playerEntries = ge.filter(e=>e.userId===uid).length || 1;
        const dpi = Math.round((totalEntryScore/winners.length/playerEntries)*100)/100;
        awards.push({ id:uuid(), gameId, userId:uid, rank:null, dpiScore:dpi, prizeAmount:prize, createdAt:new Date().toISOString() });
      });
    } else {
      const ranks = [
        document.getElementById('r1')?.value,
        document.getElementById('r2')?.value,
        document.getElementById('r3')?.value
      ].filter(Boolean);
      if (!ranks[0]) { alert('1등을 선택하세요.'); return; }
      const ratios = [0.5, 0.3, 0.2];
      ranks.forEach((uid, i) => {
        const playerEntries = ge.filter(e=>e.userId===uid).length || 1;
        const dpi = Math.round((totalEntryScore*ratios[i]/playerEntries)*100)/100;
        awards.push({ id:uuid(), gameId, userId:uid, rank:i+1, dpiScore:dpi, prizeAmount:Math.floor(totalPrize*ratios[i]), createdAt:new Date().toISOString() });
      });
    }
    DB.set('awards', awards);
    render();
  };

  function bindPlayerSeed(playerId) {
    const form = document.getElementById('sf');
    if (!form) return;
    form.addEventListener('submit', e => {
      e.preventDefault();
      const amount = parseInt(document.getElementById('sa').value);
      // 사유: 게임 선택 vs 직접 입력
      const gameNote = document.getElementById('sn-game');
      const textNote = document.getElementById('sn-text');
      const noteGameWrap = document.getElementById('note-game-wrap');
      let note = '';
      if (noteGameWrap && !noteGameWrap.classList.contains('hidden')) {
        note = gameNote ? gameNote.value : '';
      } else {
        note = textNote ? textNote.value.trim() : '';
      }
      if (!amount || isNaN(amount)) return msg('sm','err','금액을 입력하세요.');
      const users = DB.get('users')||[];
      const ui = users.findIndex(u=>u.id===playerId);
      const newBal = users[ui].seedBalance + amount;
      if (newBal < 0) return msg('sm','err','잔액이 부족합니다.');
      users[ui].seedBalance = newBal;
      DB.set('users', users);
      const txns = DB.get('seedTxns')||[];
      txns.push({ id:uuid(), userId:playerId, type:amount>0?'charge':'use', amount, balanceAfter:newBal, note:note||(amount>0?'관리자 지급':'관리자 차감'), entryId:null, createdAt:new Date().toISOString() });
      DB.set('seedTxns', txns);
      if (CU.id === playerId) syncUser();
      render();
    });

    // 딜러 DPI 처리
    const dealerForm = document.getElementById('df');
    if (!dealerForm) return;
    dealerForm.addEventListener('submit', e => {
      e.preventDefault();
      const delta = parseFloat(document.getElementById('da').value);
      const dnGameWrap = document.getElementById('dnote-game-wrap');
      const dnGame = document.getElementById('dn-game');
      const dnText = document.getElementById('dn-text');
      let note = '';
      if (dnGameWrap && !dnGameWrap.classList.contains('hidden')) {
        note = dnGame ? dnGame.value : '';
      } else {
        note = dnText ? dnText.value.trim() : '';
      }
      note = note || '딜러 DPI 보상';
      if (!delta || isNaN(delta)) return msg('dm','err','횟수를 입력하세요.');
      const users = DB.get('users')||[];
      const ui = users.findIndex(u=>u.id===playerId);
      const prev = users[ui].dealer || 0;
      const next = prev + delta;
      if (next < 0) return msg('dm','err','딜러 횟수가 0 미만이 될 수 없습니다.');
      users[ui].dealer = Math.round(next*10)/10;
      DB.set('users', users);
      // DPI 변경 내역을 로그로 남기기 위해 awards에 별도 기록 대신 note로 표시
      msg('dm','ok',`딜러 횟수 ${delta>0?'+':''}${delta}회 적용 → 총 ${next}회 (DPI +${(next*0.5).toFixed(1)})`);
      setTimeout(()=>render(), 1200);
    });
  }

      </tr>`;
    }).join('');
    return `
      <div class="space-y-6">
        <h1 class="text-2xl font-bold">💰 시드 현황</h1>
        <div class="grid grid-cols-3 gap-4">
          <div class="stat-card"><p class="text-slate-400 text-xs">전체 시드 잔액</p><p class="text-2xl font-bold text-yellow-400 mt-1">${fmtMoney(totalSeed)}</p></div>
          <div class="stat-card"><p class="text-slate-400 text-xs">총 충전 누계</p><p class="text-xl font-bold text-blue-400 mt-1">${fmtMoney(totalCharged)}</p></div>
          <div class="stat-card"><p class="text-slate-400 text-xs">플레이어 수</p><p class="text-2xl font-bold mt-1">${users.length}명</p></div>
        </div>
        <div class="card overflow-hidden">
          <table><thead><tr><th>이름</th><th>아이디</th><th>현재 잔액</th><th>총 충전</th><th>총 사용</th></tr></thead>
          <tbody>${rows}</tbody></table>
        </div>
      </div>`;
  }

  // ============================
  // BOOT
  // ============================
  (async function boot() {
    // 로딩 화면
    document.getElementById('app').innerHTML = `
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px">
        <div style="width:48px;height:48px;border:4px solid #334155;border-top-color:#4ade80;border-radius:50%;animation:spin 0.8s linear infinite"></div>
        <p style="color:#94a3b8;font-size:14px">데이터 불러오는 중...</p>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;

    // Supabase에서 전체 데이터 로드
    const { data, error } = await _sb.from('app_data').select('key, value');
    if (error) {
      document.getElementById('app').innerHTML =
        `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#f87171;font-size:14px;text-align:center;padding:20px">
          ⚠️ 서버 연결 오류<br><small style="color:#94a3b8;margin-top:8px;display:block">${error.message}</small>
        </div>`;
      return;
    }
    (data || []).forEach(row => { _mem[row.key] = row.value; });

    // 초기 데이터 세팅 (최초 1회)
    initDB();

    // Realtime 구독 — 다른 사용자가 데이터 바꾸면 자동 반영
    _sb.channel('app_data')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'app_data' }, payload => {
        if (payload.new && payload.new.key) {
          _mem[payload.new.key] = payload.new.value;
          render();
        }
      })
      .subscribe();

    render();
  })();
  </script>
</body>
</html>
